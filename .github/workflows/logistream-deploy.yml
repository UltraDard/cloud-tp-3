name: LogiStream CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_REGION: ${{ secrets.GKE_REGION }}
  REGISTRY: europe-west9-docker.pkg.dev
  # On définit les tags ici pour qu'ils soient accessibles partout
  PRODUCER_IMAGE: europe-west9-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tp2-registry/gps-producer
  CONSUMER_IMAGE: europe-west9-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tp2-registry/tracker-consumer

jobs:
  # === Job 1: Tests ===
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances
        run: |
          cd producer && npm ci
          cd ../consumer && npm ci
      - name: Valider les manifests Kubernetes
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          ./kubeval k8s/*.yaml --ignore-missing-schemas

  # === Job 2: Build & Push ===
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configurer Docker
        run: gcloud auth configure-docker ${REGISTRY} --quiet
      - name: Build & Push Images
        run: |
          TAG_PRODUCER="${{ env.PRODUCER_IMAGE }}:${{ github.sha }}"
          TAG_CONSUMER="${{ env.CONSUMER_IMAGE }}:${{ github.sha }}"
          
          docker build -t $TAG_PRODUCER ./producer/
          docker push $TAG_PRODUCER
          
          docker build -t $TAG_CONSUMER ./consumer/
          docker push $TAG_CONSUMER

  # === Job 3: Deploy sur GKE ===
  deploy:
    name: Deploy sur GKE
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4
      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'kubectl'
      - name: Configurer kubectl
        run: |
          gcloud container clusters get-credentials ${GKE_CLUSTER} \
            --region=${GKE_REGION} --project=${PROJECT_ID}
      - name: Créer le namespace et appliquer les manifests
        run: |
          kubectl create namespace logistream --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/ -n logistream
      - name: Mettre à jour les images
        run: |
          kubectl set image deployment/gps-producer gps-producer=${{ env.PRODUCER_IMAGE }}:${{ github.sha }} -n logistream
          kubectl set image deployment/tracker-consumer tracker-consumer=${{ env.CONSUMER_IMAGE }}:${{ github.sha }} -n logistream
      - name: Attendre les déploiements
        run: |
          kubectl rollout status deployment/gps-producer -n logistream --timeout=5m
          kubectl rollout status deployment/tracker-consumer -n logistream --timeout=5m
      - name: Vérification post-déploiement
        run: |
          kubectl get pods -n logistream
          echo "Déploiement LogiStream réussi pour le commit ${{ github.sha }} !"
